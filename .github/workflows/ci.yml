name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend · build · test · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (blocking)
        run: npx eslint "{src,test}/**/*.ts" --max-warnings 0

      - name: Unit tests (with coverage)
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  backend-e2e:
    name: Backend · e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urbanflow
          POSTGRES_PASSWORD: urbanflow_dev
          POSTGRES_DB: urbanflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://urbanflow:urbanflow_dev@localhost:5432/urbanflow
      JWT_SECRET: ci-jwt-secret
      PRIM_API_URL: https://prim.iledefrance-mobilites.fr
      PRIM_API_KEY: ci-key
      IDFM_DATA_API_URL: https://data.iledefrance-mobilites.fr/api/explore/v2.1
      GTFS_STATIC_URL: https://example.com/gtfs-static.zip
      GTFS_RT_URL: https://example.com/gtfs-rt
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci

      - name: e2e tests
        run: npm run test:e2e -- --runInBand

  frontend:
    name: Frontend · build · test · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    env:
      # Prod-style build: no NEXT_PUBLIC_API_URL → relative "/api" URLs are
      # baked in (routed to the backend by nginx). Matches the Docker build.
      NEXT_PUBLIC_API_URL: ""
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (blocking)
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          if-no-files-found: ignore
