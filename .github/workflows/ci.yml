name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  security:
    name: Security · audit · SAST
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v5.0.1 (node24 runtime)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: npm audit — backend
        working-directory: apps/backend
        run: npm audit --audit-level=moderate

      - name: npm audit — frontend
        working-directory: apps/frontend
        run: npm audit --audit-level=moderate

      - name: SAST — Semgrep scan
        uses: docker://returntocorp/semgrep:latest
        with:
          args: semgrep --config=auto --error /github/workspace

  backend:
    name: Backend · build · test · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      # actions/checkout v5.0.1 (node24 runtime)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      # actions/setup-node v7.0.0 (node24 runtime)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (blocking)
        run: npx eslint "{src,test}/**/*.ts" --max-warnings 0

      - name: Unit tests (with coverage)
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        # actions/upload-artifact v6.0.0 (node24 runtime)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  backend-e2e:
    name: Backend · e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urbanflow
          POSTGRES_PASSWORD: urbanflow_dev
          POSTGRES_DB: urbanflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://urbanflow:urbanflow_dev@localhost:5432/urbanflow
      JWT_SECRET: ci-jwt-secret
      PRIM_API_URL: https://prim.iledefrance-mobilites.fr
      PRIM_API_KEY: ci-key
      IDFM_DATA_API_URL: https://data.iledefrance-mobilites.fr/api/explore/v2.1
      GTFS_STATIC_URL: https://example.com/gtfs-static.zip
      GTFS_RT_URL: https://example.com/gtfs-rt
    steps:
      # actions/checkout v5.0.1 (node24 runtime)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      # actions/setup-node v7.0.0 (node24 runtime)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci

      - name: e2e tests
        run: npm run test:e2e -- --runInBand

  frontend:
    name: Frontend · build · test · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    env:
      # Prod-style build: no NEXT_PUBLIC_API_URL → relative "/api" URLs are
      # baked in (routed to the backend by nginx). Matches the Docker build.
      NEXT_PUBLIC_API_URL: ""
    steps:
      # actions/checkout v5.0.1 (node24 runtime)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      # actions/setup-node v7.0.0 (node24 runtime)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (blocking)
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        # actions/upload-artifact v6.0.0 (node24 runtime)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          if-no-files-found: ignore
