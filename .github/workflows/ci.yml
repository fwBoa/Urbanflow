# ─── CI: build + test gate, plus informational lint ──────────────────────────
# Runs on every push to main and on pull requests. The gate is build + unit
# tests (both currently green). Lint is run as informational (continue-on-error)
# because the repo has pre-existing lint debt (~700 backend / ~70 frontend
# issues, mostly prettier formatting). Once that is cleaned up, promote the
# lint steps to blocking by removing `continue-on-error: true`.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests (with coverage)
        run: npm test -- --coverage

      - name: Lint (informational)
        continue-on-error: true
        run: npx eslint "{src,test}/**/*.ts" --max-warnings=-1

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    env:
      # Prod-style build: no NEXT_PUBLIC_API_URL → relative "/api" URLs are
      # baked in (routed to the backend by nginx). Matches the Docker build.
      NEXT_PUBLIC_API_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Lint (informational)
        continue-on-error: true
        run: npm run lint