# ─── Deploy: auto on push to main or manual, gated via SSH ───────────────
# Triggered automatically on every push to main, or manually (workflow_dispatch).
# Production is gated by the GitHub "prod" environment (configure required
# reviewers in repo Settings → Environments). The job SSHes into the host
# and runs scripts/deploy.sh, which pulls the branch and rebuilds the stack.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          host running Docker + the checked-out repo
#   SSH_USER          ssh user
#   SSH_PRIVATE_KEY   private key authorized on the host
#   DEPLOY_PATH       absolute path of the repo on the host
name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        default: prod
        options:
          - staging
          - prod

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      # actions/checkout v5.0.1 (node24 runtime)
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Verify required secrets are configured
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; missing=1; fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: SSH deploy
        # appleboy/ssh-action v1.2.2
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --prune
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            ./scripts/deploy.sh ${{ github.event.inputs.environment || 'prod' }}
