# ─── Deploy: manual, gated, via SSH to the Docker host ──────────────────────
# Triggered manually (workflow_dispatch) with an environment choice.
# Production is gated by the GitHub "prod" environment (configure required
# reviewers in repo Settings → Environments). The job SSHes into the host
# and runs scripts/deploy.sh, which pulls the branch and rebuilds the stack.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          host running Docker + the checked-out repo
#   SSH_USER          ssh user
#   SSH_PRIVATE_KEY   private key authorized on the host
#   DEPLOY_PATH       absolute path of the repo on the host
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        default: staging
        options:
          - staging
          - prod

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets are configured
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; missing=1; fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --prune
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            ./scripts/deploy.sh ${{ github.event.inputs.environment }}