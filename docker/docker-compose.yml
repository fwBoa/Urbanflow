# ─── Log rotation (per-tier retention set by deploy.sh via env) ──────────────
#   defaults: 10m per file, 5 files (~50 MB rolling per service)
#   staging keeps more history, prod less — see scripts/deploy.sh
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILE:-5}"

services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: urbanflow-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urbanflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urbanflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-urbanflow}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-urbanflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ───
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: urbanflow-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-urbanflow}:${POSTGRES_PASSWORD:-urbanflow_dev}@postgres:5432/${POSTGRES_DB:-urbanflow}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-2h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      PRIM_API_KEY: ${PRIM_API_KEY:-}
      PRIM_API_URL: ${PRIM_API_URL:-https://api-lab.idfm.fr}
      GTFS_RADIUS_KM: ${GTFS_RADIUS_KM:-15}
      # GTFS désormais en PostgreSQL : Node ne conserve plus les ~6,8 M
      # stop_times en heap (consommation réelle ~100 Mo). L'ancienne limite
      # 3584 Mo (ère Maps en mémoire → OOM exit 137 sur la VM 3,826 Gio) est
      # donc abaissée à 1024 Mo : plafonnnement confortable, marge sous la VM.
      NODE_OPTIONS: --max-old-space-size=1024
    ports:
      - '4000:4000'
    volumes:
      - gtfs_data:/app/data/gtfs
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (Next.js) ───
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* est inliné par Next.js AU BUILD (pas au runtime).
      # On passe donc l'URL API en build arg pour qu'elle soit bake dans le
      # bundle client. En prod (derrière nginx), laisser NEXT_PUBLIC_API_URL
      # vide dans l'env → API_BASE="" → URLs relatives "/api" proxifiées par nginx.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: urbanflow-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '3001:3001'
    depends_on:
      - backend

  # ─── Nginx (Production reverse proxy) ───
  nginx:
    image: nginx:alpine
    container_name: urbanflow-nginx
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - production
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  gtfs_data: